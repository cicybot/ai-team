<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiCy - 虚拟 AI 团队</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    
    .prose pre { background-color: rgba(0,0,0,0.5); padding: 1rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem;}
    .prose code { color: #e2e8f0; font-family: monospace; font-size: 0.875em; }
    .prose p { margin-bottom: 0.5rem; }
    .prose p:last-child { margin-bottom: 0; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="h-screen bg-[#0A0A0A] text-gray-200 flex flex-col font-sans overflow-hidden selection:bg-blue-500/30">
  
  <!-- Header -->
  <header class="h-14 border-b border-white/10 flex items-center justify-between px-6 bg-[#0A0A0A]/80 backdrop-blur-md z-10 shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-lg flex items-center justify-center shadow-lg">
        <i data-lucide="terminal" class="text-white w-4 h-4"></i>
      </div>
      <span class="font-semibold text-white tracking-tight">CiCy</span>
      <span class="px-2 py-0.5 rounded-full bg-white/10 text-[10px] font-medium text-gray-400 ml-2 uppercase tracking-wider">测试版</span>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-colors cursor-pointer">
        <i data-lucide="credit-card" class="text-gray-400 w-3.5 h-3.5"></i>
        <span id="balance-display" class="text-sm font-medium font-mono">$1250.00</span>
        <i data-lucide="plus" class="text-blue-400 ml-1 w-3.5 h-3.5"></i>
      </div>
      <button class="text-gray-400 hover:text-white transition-colors">
        <i data-lucide="settings" class="w-4.5 h-4.5"></i>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex-1 flex overflow-hidden">
    
    <!-- Left Sidebar - Team -->
    <aside class="w-64 border-r border-white/10 bg-[#0F0F0F] flex flex-col shrink-0">
      <div class="p-4 border-b border-white/10">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">团队成员</h2>
      </div>
      <div id="agent-list" class="flex-1 overflow-y-auto p-3 space-y-2">
        <!-- Agents injected here -->
      </div>
    </aside>

    <!-- Middle - Chat Area -->
    <main class="flex-1 flex flex-col bg-[#0A0A0A] min-w-0 relative">
      <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth">
        <!-- Messages injected here -->
      </div>

      <!-- Input Area -->
      <div class="p-4 bg-[#0A0A0A] border-t border-white/10 shrink-0">
        <div class="max-w-4xl mx-auto relative">
          <div id="mention-suggestions" class="absolute -top-8 left-2 flex gap-2">
            <!-- Mentions injected here -->
          </div>
          <form id="chat-form" class="relative flex items-end gap-2 bg-[#1A1A1A] border border-white/10 rounded-2xl p-2 focus-within:border-white/30 focus-within:ring-1 focus-within:ring-white/10 transition-all shadow-sm">
            <div class="flex-1 min-h-[44px] relative flex items-center">
              <input
                type="text"
                id="chat-input"
                autocomplete="off"
                placeholder="发送消息给团队... 使用 @ 提及成员"
                class="w-full bg-transparent border-none text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-0 px-3 py-2 text-sm"
              />
            </div>
            <button 
              type="submit"
              id="send-button"
              disabled
              class="shrink-0 w-10 h-10 bg-white text-black rounded-xl flex items-center justify-center hover:bg-gray-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <i data-lucide="send" class="w-4 h-4 ml-0.5"></i>
            </button>
          </form>
        </div>
      </div>
    </main>

    <!-- Right Sidebar - Task Progress -->
    <aside class="w-72 border-l border-white/10 bg-[#0F0F0F] flex flex-col shrink-0 hidden lg:flex">
      <div class="p-4 border-b border-white/10">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">当前任务进度</h2>
      </div>
      <div class="flex-1 overflow-y-auto p-6">
        <div class="relative">
          <!-- Vertical Line -->
          <div class="absolute left-[11px] top-4 bottom-4 w-px bg-white/10"></div>
          
          <div id="pipeline-stages" class="space-y-8 relative">
            <!-- Stages injected here -->
          </div>
        </div>
        
        <div class="mt-12 p-4 rounded-xl bg-white/5 border border-white/10">
          <h3 class="text-xs font-medium text-gray-400 mb-3">最新产出物</h3>
          <div class="space-y-2">
            <div class="flex items-center gap-2 text-sm text-gray-300 p-2 hover:bg-white/5 rounded-lg cursor-pointer transition-colors">
              <i data-lucide="code" class="text-emerald-400 w-3.5 h-3.5"></i>
              <span class="truncate">schema.ts</span>
            </div>
            <div class="flex items-center gap-2 text-sm text-gray-300 p-2 hover:bg-white/5 rounded-lg cursor-pointer transition-colors">
              <i data-lucide="pen-tool" class="text-purple-400 w-3.5 h-3.5"></i>
              <span class="truncate">wireframe.fig</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <script>
    // State
    let balance = 1250.00;
    let selectedAgentId = null;
    let isThinking = false;

    const agents = [
      { id: 'agent-0', name: '艾丽丝', role: 'CEO顾问', icon: 'bot', color: 'text-blue-400', bgColor: 'bg-blue-500/10', status: 'idle', tokens: 0, sessionTime: '00:00', currentActivity: '等待指令' },
      { id: 'agent-1', name: '鲍勃', role: '工程师', icon: 'code', color: 'text-emerald-400', bgColor: 'bg-emerald-500/10', status: 'idle', tokens: 0, sessionTime: '00:00', currentActivity: '空闲' },
      { id: 'agent-2', name: '查理', role: 'QA测试员', icon: 'check-circle', color: 'text-amber-400', bgColor: 'bg-amber-500/10', status: 'idle', tokens: 0, sessionTime: '00:00', currentActivity: '空闲' },
      { id: 'agent-3', name: '戴安娜', role: '设计师', icon: 'pen-tool', color: 'text-purple-400', bgColor: 'bg-purple-500/10', status: 'idle', tokens: 0, sessionTime: '00:00', currentActivity: '空闲' },
      { id: 'agent-4', name: '伊芙', role: '安全审计', icon: 'shield-alert', color: 'text-rose-400', bgColor: 'bg-rose-500/10', status: 'idle', tokens: 0, sessionTime: '00:00', currentActivity: '空闲' },
    ];

    const messages = [
      {
        id: 'msg-0',
        senderId: 'agent-0',
        text: '你好！我是艾丽丝，你的 CEO 顾问。虚拟团队已就绪，请问我们今天要做什么项目？',
        timestamp: new Date(),
      }
    ];

    const stages = [
      { id: 'req', name: '需求', status: 'active' },
      { id: 'sol', name: '方案', status: 'pending' },
      { id: 'dev', name: '开发', status: 'pending' },
      { id: 'test', name: '测试', status: 'pending' },
      { id: 'dep', name: '上线', status: 'pending' },
    ];

    // DOM Elements
    const agentListEl = document.getElementById('agent-list');
    const chatContainerEl = document.getElementById('chat-container');
    const chatFormEl = document.getElementById('chat-form');
    const chatInputEl = document.getElementById('chat-input');
    const sendButtonEl = document.getElementById('send-button');
    const pipelineStagesEl = document.getElementById('pipeline-stages');
    const mentionSuggestionsEl = document.getElementById('mention-suggestions');
    const balanceDisplayEl = document.getElementById('balance-display');

    // Render Functions
    function renderAgents() {
      agentListEl.innerHTML = agents.map(agent => {
        const isSelected = selectedAgentId === agent.id;
        const isThinking = agent.status === 'thinking';
        
        let detailsHtml = '';
        if (isSelected) {
          detailsHtml = `
            <div class="pt-4 mt-3 border-t border-white/10 space-y-3 animate-fade-in">
              <div class="flex items-center justify-between text-xs">
                <span class="text-gray-500 flex items-center gap-1.5"><i data-lucide="activity" class="w-3 h-3"></i> 状态</span>
                <span class="${isThinking ? 'text-blue-400' : 'text-gray-300'}">
                  ${isThinking ? '思考中...' : '空闲'}
                </span>
              </div>
              <div class="flex items-center justify-between text-xs">
                <span class="text-gray-500 flex items-center gap-1.5"><i data-lucide="cpu" class="w-3 h-3"></i> 消耗 Token</span>
                <span class="font-mono text-gray-300">${agent.tokens.toLocaleString()}</span>
              </div>
              <div class="flex items-center justify-between text-xs">
                <span class="text-gray-500 flex items-center gap-1.5"><i data-lucide="clock" class="w-3 h-3"></i> 会话时长</span>
                <span class="font-mono text-gray-300">${agent.sessionTime}</span>
              </div>
              <div class="text-xs text-gray-400 bg-black/30 p-2 rounded-lg border border-white/5 mt-2 line-clamp-2">
                ${agent.currentActivity}
              </div>
            </div>
          `;
        }

        return `
          <button 
            onclick="toggleAgent('${agent.id}')"
            class="w-full text-left p-3 rounded-xl transition-all border ${isSelected ? 'bg-white/10 border-white/20 shadow-sm' : 'bg-transparent border-transparent hover:bg-white/5'}"
          >
            <div class="flex items-center gap-3">
              <div class="relative w-10 h-10 rounded-full flex items-center justify-center ${agent.bgColor} ${agent.color}">
                <i data-lucide="${agent.icon}" class="w-4.5 h-4.5"></i>
                ${isThinking ? `
                  <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-[#0F0F0F] rounded-full flex items-center justify-center">
                    <span class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse"></span>
                  </span>
                ` : ''}
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                  <span class="font-medium text-sm text-gray-200 truncate">${agent.name}</span>
                </div>
                <div class="text-xs text-gray-500 truncate">${agent.role}</div>
              </div>
            </div>
            ${detailsHtml}
          </button>
        `;
      }).join('');
      lucide.createIcons();
    }

    function renderMessages() {
      let html = messages.map(msg => {
        const isUser = msg.senderId === 'user';
        const agent = agents.find(a => a.id === msg.senderId);
        const timeString = msg.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const avatarHtml = isUser 
          ? `<div class="w-8 h-8 rounded-full bg-white text-black flex items-center justify-center"><i data-lucide="user" class="w-4 h-4"></i></div>`
          : `<div class="w-8 h-8 rounded-full flex items-center justify-center ${agent.bgColor} ${agent.color}"><i data-lucide="${agent.icon}" class="w-4.5 h-4.5"></i></div>`;

        const nameHtml = isUser ? '你' : agent.name;
        const roleHtml = !isUser ? `<span class="text-xs text-gray-500">${agent.role}</span>` : '';
        
        const bubbleClass = isUser 
          ? 'bg-white text-black rounded-tr-sm' 
          : 'bg-[#1A1A1A] text-gray-200 border border-white/5 rounded-tl-sm';

        const parsedText = marked.parse(msg.text);

        return `
          <div class="flex gap-4 max-w-3xl ${isUser ? 'ml-auto flex-row-reverse' : ''} animate-fade-in-up">
            <div class="shrink-0 mt-1">
              ${avatarHtml}
            </div>
            <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'} min-w-0">
              <div class="flex items-baseline gap-2 mb-1.5 mx-1">
                <span class="text-sm font-medium text-gray-300">${nameHtml}</span>
                ${roleHtml}
                <span class="text-[10px] text-gray-600 font-mono">${timeString}</span>
              </div>
              <div class="px-5 py-3.5 rounded-2xl text-sm leading-relaxed ${bubbleClass}">
                <div class="prose prose-sm max-w-none">${parsedText}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      if (isThinking) {
        html += `
          <div class="flex gap-4 max-w-3xl animate-fade-in-up" id="thinking-indicator">
            <div class="shrink-0 mt-1">
              <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                <i data-lucide="bot" class="text-gray-400 w-4 h-4"></i>
              </div>
            </div>
            <div class="flex flex-col items-start">
              <div class="flex items-baseline gap-2 mb-1 mx-1">
                <span class="text-sm font-medium text-gray-400">团队正在思考</span>
              </div>
              <div class="px-5 py-4 rounded-2xl bg-[#1A1A1A] border border-white/5 rounded-tl-sm flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                <span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
              </div>
            </div>
          </div>
        `;
      }

      chatContainerEl.innerHTML = html;
      lucide.createIcons();
      chatContainerEl.scrollTop = chatContainerEl.scrollHeight;
    }

    function renderStages() {
      pipelineStagesEl.innerHTML = stages.map((stage, idx) => {
        const isCompleted = stage.status === 'completed';
        const isActive = stage.status === 'active';
        
        let iconHtml = isCompleted 
          ? `<i data-lucide="check-circle" class="w-3 h-3"></i>` 
          : `<span class="text-[10px] font-bold">${idx + 1}</span>`;
          
        let circleClass = isCompleted 
          ? 'bg-blue-500 border-blue-500 text-white' 
          : isActive
          ? 'bg-[#0F0F0F] border-blue-500 text-blue-500'
          : 'bg-[#0F0F0F] border-white/20 text-gray-600';

        let textClass = isCompleted ? 'text-gray-300' : isActive ? 'text-white' : 'text-gray-500';

        return `
          <div class="flex gap-4 relative">
            <div class="shrink-0 w-6 h-6 rounded-full flex items-center justify-center z-10 border-2 ${circleClass}">
              ${iconHtml}
            </div>
            <div class="flex-1 pt-0.5">
              <div class="text-sm font-medium ${textClass}">
                ${stage.name}
              </div>
              ${isActive ? `
                <div class="text-xs text-blue-400 mt-1 flex items-center gap-1">
                  <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                  进行中
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    function renderMentions() {
      mentionSuggestionsEl.innerHTML = agents.map(a => `
        <button 
          type="button"
          onclick="insertMention('${a.name}')"
          class="text-[10px] font-medium px-2 py-1 rounded-md bg-white/5 text-gray-400 hover:bg-white/10 hover:text-white transition-colors border border-white/5"
        >
          @${a.name}
        </button>
      `).join('');
    }

    // Actions
    window.toggleAgent = (id) => {
      selectedAgentId = selectedAgentId === id ? null : id;
      renderAgents();
    };

    window.insertMention = (name) => {
      chatInputEl.value += `@${name} `;
      chatInputEl.focus();
      updateSendButton();
    };

    function updateSendButton() {
      sendButtonEl.disabled = !chatInputEl.value.trim() || isThinking;
    }

    chatInputEl.addEventListener('input', updateSendButton);

    chatFormEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInputEl.value.trim();
      if (!text || isThinking) return;

      // Add user message
      messages.push({
        id: 'msg-' + Date.now(),
        senderId: 'user',
        text: text,
        timestamp: new Date()
      });
      
      chatInputEl.value = '';
      updateSendButton();
      
      // Find target agent
      let targetAgent = agents[0];
      for (const a of agents) {
        if (text.includes('@' + a.name)) {
          targetAgent = a;
          break;
        }
      }

      // Set thinking state
      isThinking = true;
      targetAgent.status = 'thinking';
      targetAgent.currentActivity = '正在分析请求...';
      renderAgents();
      renderMessages();

      // Simulate reply
      setTimeout(() => {
        let replyText = '明白。我会将其纳入我们当前的开发阶段。';
        if (targetAgent.role === '工程师') {
          replyText = '我已经评估了需求。这是建议的技术方案：\n\n```typescript\ninterface Feature {\n  id: string;\n  name: string;\n}\n```\n\n请确认这是否符合你的预期。';
        } else if (targetAgent.role === 'QA测试员') {
          replyText = '我正在为这个功能准备测试用例。我们需要确保覆盖所有的边界情况。';
        }

        messages.push({
          id: 'msg-' + (Date.now() + 1),
          senderId: targetAgent.id,
          text: replyText,
          timestamp: new Date()
        });

        isThinking = false;
        targetAgent.status = 'idle';
        targetAgent.currentActivity = '空闲';
        targetAgent.tokens += Math.floor(Math.random() * 50) + 10;
        
        balance = Math.max(0, balance - 0.05);
        balanceDisplayEl.textContent = '$' + balance.toFixed(2);

        renderAgents();
        renderMessages();
      }, 2000);
    });

    // Initial Render
    renderAgents();
    renderMessages();
    renderStages();
    renderMentions();
  </script>
</body>
</html>
